version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - BASE_URL=http://localhost:8000
    volumes:
      - ./data:/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pet_frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped