services:
  api:
    build: .
    container_name: pet-qr-tracker
    ports:
      - "8000:8000"
    volumes:
      - ./data:/backend/data       # Banco SQLite persistido
      - ./app:/backend/app         # Hot-reload no desenvolvimento
    env_file:
      - .env                       # Credenciais Twilio e BASE_URL
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
